<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bienvenue | Tana Score</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='tana logo.png') }}"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    .container.accueil {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .btn-start {
      display: inline-block;
      padding: 12px 24px;
      font-size: 18px;
      background-color: #ff69b4;
      color: white;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.3s ease;
      margin-top: 20px;
    }

    .btn-start:hover {
      background-color: #ff85c1;
    }

    /* Header logo */
    .page-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 20px;
    }

    .site-logo {
      height: 40px;
      width: auto;
    }

    .page-header h1 {
      margin: 0;
    }

    /* Cacher les barres roses sur mobile */
    @media screen and (max-width: 768px) {
      .barre-rose {
        display: none !important;
      }
    }
  </style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZRCSWGT0BK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "G-ZRCSWGT0BK");
  </script>
</head>
<body>
  <header class="page-header">
    <img src="{{ url_for('static', filename='tana logo.png') }}" alt="Logo TANA" class="site-logo" />
  </header>

  <div class="container accueil">
    <h1>Bienvenue sur Tana Score</h1>
    <p>Découvre ton score en répondant à quelques questions !</p>
    <a href="{{ url_for('quiz') }}" class="btn-start">Commencer</a>
  </div>
</body>
</html>
