<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur - TANA Score</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 40px 20px;
            text-align: center;
        }
        
        .error-card {
            background-color: #2c2c2c;
            padding: 40px;
            border-radius: 16px;
            max-width: 600px;
            box-shadow: 0 4px 25px rgba(255, 105, 180, 0.2);
        }
        
        .error-title {
            color: #ff69b4;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .error-message {
            color: #f0f0f0;
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .error-details {
            background-color: #1c1c1c;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            color: #ff6b6b;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .btn-retry {
            display: inline-block;
            padding: 15px 30px;
            background-color: #ff69b4;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        
        .btn-retry:hover {
            background-color: #ff4da6;
        }
    </style>
</head>
<body>
    <header class="page-header">
        <img src="{{ url_for('static', filename='tana logo.png') }}" alt="Logo TANA" class="site-logo" />
    </header>

    <div class="error-container">
        <div class="error-card">
            <h1 class="error-title">⚠️ Oups !</h1>
            <p class="error-message">
                Il y a un problème avec les données que tu as envoyées.
            </p>
            
            <div class="error-details">
                {{ error }}
            </div>
            
            <p class="error-message">
                Vérifie que tu as bien rempli tous les champs correctement et réessaye.
            </p>
            
            <a href="{{ url_for('quiz') }}" class="btn-retry">
                ← Retour au quiz
            </a>
        </div>
    </div>
</body>
</html>
