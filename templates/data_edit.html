<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier Donnée - TANA</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .form-container { background-color: #2c2c2c; padding: 30px; border-radius: 12px; max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 300px; background-color: #111; color: #fff; border: 1px solid #555; padding: 10px; font-family: monospace; font-size: 1rem; border-radius: 8px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1rem; cursor: pointer; border: none; }
        .btn-save { background-color: #ff69b4; color: white; }
        .btn-cancel { background-color: #666; color: white; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 style="color: #ff69b4;">✏️ Modifier l'Entrée #{{ row.id }}</h1>
        <p style="color: #aaa;">Date : {{ row.timestamp }}<br>Score actuel : {{ "%.2f"|format(row.score_t) }}</p>
        
        <form action="{{ url_for('dashboard_data_edit', id=row.id) }}" method="POST">
            <label style="display:block; margin-bottom:10px; font-weight:bold;">Données brutes (Format JSON obligatoire) :</label>
            <textarea name="raw_data" required>{{ row.raw_data }}</textarea>
            
            <p style="color: #ffaa00; font-size: 0.9rem;">Attention : Si vous faites une erreur de syntaxe JSON, le calcul échouera. Le score sera recalculé automatiquement lors de la sauvegarde.</p>
            
            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-save">💾 Enregistrer les modifications</button>
                <a href="{{ url_for('dashboard_data') }}" class="btn btn-cancel">Annuler</a>
            </div>
        </form>
    </div>
</body>
</html>
