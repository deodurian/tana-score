

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin - Résultats</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    function toggleData() {
      const dataBlock = document.getElementById('data-block');
      dataBlock.style.display = (dataBlock.style.display === 'none') ? 'block' : 'none';
    }

    function majStats() {
      fetch('/admin/stats')
        .then(res => res.json())
        .then(data => {
          document.getElementById('total_users').textContent = data.total_users;
          document.getElementById('score_moyen').textContent = data.score_moyen;
          document.getElementById('connected').textContent = data.connected;
        });
    }

    setInterval(majStats, 5000);
    window.onload = majStats;
  </script>
</head>
<body>
  <div class="admin-container">
    <h1>Données administratives</h1>

    <div id="stats" style="margin-bottom: 20px;">
      <p><strong>Utilisateurs totaux :</strong> <span id="total_users">0</span></p>
      <p><strong>Score moyen :</strong> <span id="score_moyen">0</span></p>
      <p><strong>Connectés en temps réel :</strong> <span id="connected">0</span></p>
    </div>

    <a href="{{ url_for('admin_download') }}" class="btn-start">📥 Télécharger les données</a>

    <button onclick="toggleData()">Voir données</button>
    <div id="data-block" style="display: none; margin-top: 20px;">
      {% for entry in donnees %}
        <div class="entry-block">
          <pre>{{ entry | tojson(indent=2) }}</pre>
        </div>
      {% endfor %}
    </div>

    <a href="{{ url_for('accueil') }}" class="btn-start">↩ Retour à l'accueil</a>
  </div>
</body>
</html>
